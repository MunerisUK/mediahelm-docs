# MediaHelm — Docker Compose using the published GHCR image (no build needed).
# Usage:  docker compose up -d      then open http://localhost:5005
#
# A strong secret is generated on first run and persisted in ./data, so no
# configuration is required to start. Uncomment MEDIAHELM_* below to override.
services:
  mediahelm:
    image: ghcr.io/munerisuk/mediahelm:latest
    container_name: mediahelm
    restart: unless-stopped
    ports:
      # host:container — change the host side to publish on a different port.
      # The container always listens on 5005 internally.
      - "5005:5005"
    volumes:
      # Persist the database, metadata snapshots and generated secret.
      - ./data:/data
    # environment:
    #   - MEDIAHELM_SECURE_COOKIES=false        # true when served over HTTPS
    #   - MEDIAHELM_TUNER_COUNT=4               # max simultaneous IPTV channels
    #   - MEDIAHELM_ADVERTISED_URL=             # e.g. http://192.168.1.50:5005
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:5005/healthz').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
